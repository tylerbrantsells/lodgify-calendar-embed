name: Deploy calendar to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "calendar_embed/**"
      - "calendar_data.json"
  workflow_run:
    workflows: ["Lodgify iCal Sync"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: calendar_embed

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # First attempt tolerates GitHub's transient "Deployment failed, try
      # again later" error; the retry below keeps the run green so no
      # failure email is sent. deploy-rescue.yml remains the backstop.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 180
      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
